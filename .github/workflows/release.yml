name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature ad-hoc macOS : évite l'erreur "endommagé" de Gatekeeper
          # sans nécessiter un compte Apple Developer payant
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Concours Pétanque ${{ github.ref_name }}
          releaseBody: |
            ## Téléchargement

            | Système | Fichier |
            |---|---|
            | Windows 10/11 | `.msi` |
            | macOS Apple Silicon (M1/M2/M3/M4) | `.dmg` `aarch64` |
            | macOS Intel | `.dmg` `x86_64` |

            ### macOS — premier lancement

            macOS bloque les apps non signées par Apple. Pour ouvrir l'app :

            **Option A** — Clic droit sur l'app → **Ouvrir** → **Ouvrir quand même**

            **Option B** — Dans le Terminal :
            ```bash
            xattr -cr "/Applications/Concours Pétanque.app"
            ```
            Puis double-cliquez normalement.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
